# FPP: Increase headroom for USB audio devices.
# USB audio cards have independent oscillators that drift relative to the
# PipeWire graph driver clock.  When multiple USB cards share a driver graph
# (via filter-chain node.group), the follower cards need extra headroom to
# give the adaptive resampler room to compensate for clock drift without
# triggering hard resyncs (audible as crackling / pitch wobble).

monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "~alsa_output.usb-*"
      }
      {
        node.name = "~alsa_input.usb-*"
      }
    ]
    actions = {
      update-props = {
        api.alsa.headroom      = 4096
      }
    }
  }
]
