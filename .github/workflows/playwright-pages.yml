name: Playwright Report

on:
  workflow_dispatch:

concurrency:
  group: playwright-report-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright:
    name: Run Playwright Against Docker Dev Stack
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      test_outcome: ${{ steps.playwright.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: development/package-lock.json

      - name: Install Playwright dependencies
        working-directory: development
        run: npm ci

      - name: Install Chromium
        working-directory: development
        run: npx playwright install --with-deps chromium

      - name: Generate src/EXPORTED_VERSION
        shell: bash
        run: |
          SOURCE_VERSION="$(git describe --tags --dirty 2>/dev/null || git describe --tags 2>/dev/null || echo "${GITHUB_REF_NAME}")"
          MAJOR_VERSION="$(echo "${SOURCE_VERSION}" | cut -f1 -d.)"
          MINOR_VERSION="$(echo "${SOURCE_VERSION}" | cut -f1 -d- | cut -f2 -d.)"
          PATCH_VERSION="$(echo "${SOURCE_VERSION}" | cut -f1 -d- | cut -f3 -d.)"

          if [ -z "${MINOR_VERSION}" ]; then
            SUBV="$(echo "${SOURCE_VERSION}" | cut -f2 -d-)"
            if [[ "${SUBV}" =~ ^[0-9]+$ ]]; then
              MINOR_VERSION="$((1000 + SUBV))"
              PATCH_VERSION=""
              TRIPLET_VERSION="${MAJOR_VERSION}.${MINOR_VERSION}"
            else
              MINOR_VERSION="0"
              PATCH_VERSION="0"
              TRIPLET_VERSION="${MAJOR_VERSION}.${MINOR_VERSION}.${PATCH_VERSION}"
            fi
          elif [ -z "${PATCH_VERSION}" ]; then
            PATCH_VERSION="0"
            TRIPLET_VERSION="${MAJOR_VERSION}.${MINOR_VERSION}.${PATCH_VERSION}"
          else
            TRIPLET_VERSION="${MAJOR_VERSION}.${MINOR_VERSION}.${PATCH_VERSION}"
          fi

          cat > src/EXPORTED_VERSION <<EOF
          SOURCE_VERSION='${SOURCE_VERSION}'
          MAJOR_VERSION='${MAJOR_VERSION}'
          MINOR_VERSION='${MINOR_VERSION}'
          PATCH_VERSION='${PATCH_VERSION}'
          TRIPLET_VERSION='${TRIPLET_VERSION}'
          BRANCH='${GITHUB_REF_NAME}'
          EOF

          cat src/EXPORTED_VERSION

      - name: Build and start FPP
        env:
          FPPBRANCH: ${{ github.ref_name }}
        run: docker compose -f Docker/docker-compose-dev.yml up -d --build fpp

      - name: Wait for FPP web UI
        run: |
          for attempt in $(seq 1 60); do
            if curl -fsSI http://127.0.0.1:8080/ >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "FPP web UI did not become ready on http://127.0.0.1:8080"
          docker compose -f Docker/docker-compose-dev.yml ps
          exit 1

      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        working-directory: development
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8080
        run: npm test

      - name: Upload Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: development/playwright-report
          if-no-files-found: error
          retention-days: 14

      - name: Show Docker logs on failure
        if: always()
        run: docker compose -f Docker/docker-compose-dev.yml logs --no-color fpp

      - name: Stop Docker stack
        if: always()
        run: docker compose -f Docker/docker-compose-dev.yml down --volumes

  deploy:
    name: Publish Report To GitHub Pages
    needs: playwright
    if: always() && needs.playwright.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download Playwright report artifact
        uses: actions/download-artifact@v5
        with:
          name: playwright-report
          path: development/playwright-report

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: development/playwright-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  finalize:
    name: Finalize Workflow Status
    needs:
      - playwright
      - deploy
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Fail workflow if tests failed
        run: |
          if [ "${{ needs.playwright.outputs.test_outcome }}" != "success" ]; then
            echo "Playwright tests failed. Report was still deployed to GitHub Pages."
            exit 1
          fi
